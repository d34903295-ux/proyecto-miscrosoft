# CI: typecheck → tests unitarios → build → evaluación del razonamiento.
# La evaluación corre contra la build de producción real (npm start).

name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests unitarios
        run: npm test

      - name: Build de producción
        run: npm run build

      - name: Evaluación del razonamiento (golden set)
        run: |
          npm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/health > /dev/null && break
            sleep 2
          done
          npm run eval
